app = "stockapp-tm3ypw"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  LITEDB_PATH = "/app/data/stock.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[[mounts]]
  source = "stock_data"
  destination = "/app/data"
